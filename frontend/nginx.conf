# Main NGINX configuration for Choreo (Read-only FS + Non-root)
worker_processes auto;
# Choreo environment requires PID file in a writable location like /tmp
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Set temporary paths to writable /tmp for restricted environments
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Basic performance tuning
    sendfile        on;
    keepalive_timeout  65;

    server {
        # Listen on a non-privileged port (>= 1024)
        listen 3000;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            # Single-page application routing Support
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Handle 404s or error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
