services:
  core-services:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    # ENVIRONMENT variables should be set in .env for independent hosting
    restart: always

  payments-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use a build-time argument that can be passed during deployment
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    restart: always